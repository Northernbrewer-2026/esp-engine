name: Build ESP Brew Engine (Distill)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build
          cd ..

      - name: Build firmware with ESP-IDF Docker
        uses: docker://espressif/idf:v5.2.1
        with:
          entrypoint: /bin/bash
          args: >-
            -c "
            . /opt/esp/idf/export.sh &&
            idf.py build
            "

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp-brew-engine-distill-firmware
          retention-days: 30
          path: |
            build/esp-brew-engine.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flash_args
